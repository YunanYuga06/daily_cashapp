name: daily_cashapp
description: "Daily CashApp — Personal Finance Tracker"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # ── Existing packages ───────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  intl: ^0.20.2
  google_nav_bar: ^5.0.7
  fl_chart: ^1.0.0
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2

  # ── NEW — Objective 3: Skeleton / Shimmer Loading ──────────────────────────
  # Provides Shimmer widget for skeleton screen effects while data is loading.
  # Usage: wrap any widget tree with Shimmer.fromColors(...)
  # Docs: https://pub.dev/packages/shimmer
  shimmer: ^3.0.0

  # ── NEW — Objective 5: Engaging Empty States (SVG Illustrations) ──────────
  # Renders inline SVG assets at any size without rasterization artefacts.
  # Usage: SvgPicture.asset('assets/illustrations/empty_transactions.svg')
  # Docs: https://pub.dev/packages/flutter_svg
  flutter_svg: ^2.0.10+1

  # ── NEW — Objective 4: Currency / Number Formatting in TextFields ──────────
  # Provides TextInputFormatter subclasses; we will use it to build a
  # CurrencyInputFormatter (thousand-separator, no decimals for IDR).
  # Docs: https://pub.dev/packages/intl  (already included above — no extra dep needed)
  # The formatter is implemented in lib/utils/currency_input_formatter.dart
  # using Dart's built-in intl package.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# ── Flutter section ───────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  # SVG illustration assets — create this folder and drop your .svg files here.
  # All 6 empty-state illustrations required by Objective 5:
  #   empty_transactions.svg
  #   empty_assets.svg
  #   empty_reminders.svg
  #   empty_budget.svg
  #   empty_generic.svg        (fallback)
  #   empty_search.svg         (for filtered / search empty results)
  assets:
    - assets/illustrations/

  # Optional: add a custom font such as Plus Jakarta Sans for a more premium feel.
  # Steps:
  #   1. Download from Google Fonts and place in assets/fonts/
  #   2. Uncomment the section below
  #   3. Update AppTextStyles._fontFamily to 'PlusJakartaSans'
  #
  # fonts:
  #   - family: PlusJakartaSans
  #     fonts:
  #       - asset: assets/fonts/PlusJakartaSans-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/PlusJakartaSans-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/PlusJakartaSans-Bold.ttf
  #         weight: 700
